<mat-toolbar class="topbar">
  <div class="brand">
    <img class="brand-logo" src="assets/orque.svg" alt="Orque" />
  </div>

  <span class="spacer"></span>

  <div class="user" *ngIf="auth.getUser() as u">
    <span class="name">{{ u.name }}</span>
    <button mat-button (click)="logout()">Logout</button>
  </div>
</mat-toolbar>
