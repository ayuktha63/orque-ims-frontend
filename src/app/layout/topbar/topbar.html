<mat-toolbar class="topbar">
  <div class="brand">
    <img class="brand-logo" src="assets/orque.svg" alt="Orque" />
  </div>

  <span class="spacer"></span>

  <div class="user" *ngIf="auth.getUser() as u">
    
    <span class="role-badge">{{ u.role }}</span>

    <button
      mat-icon-button
      class="settings-btn"
      aria-label="Settings"
      title="Settings"
      (click)="goToSettings()">
      <mat-icon>settings</mat-icon>
    </button>

    <button
      mat-icon-button
      class="logout-btn"
      aria-label="Logout"
      title="Logout"
      (click)="logout()">
      <mat-icon>logout</mat-icon>
    </button>
  </div>
</mat-toolbar>
