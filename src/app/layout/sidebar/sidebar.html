<nav class="sidebar">
  <mat-nav-list class="nav">

    <!-- Dashboard -->
    <a mat-list-item class="item"
       routerLink="/app/dashboard"
       (click)="closeInvoice()">
      <mat-icon class="icon">dashboard</mat-icon>
    </a>

    <!-- Employees -->
    <a mat-list-item class="item"
       routerLink="/app/employees"
       (click)="closeInvoice()">
      <mat-icon class="icon">people</mat-icon>
    </a>

    <!-- Finance -->
    <a mat-list-item class="item"
       routerLink="/app/finance"
       (click)="closeInvoice()">
      <mat-icon class="icon">paid</mat-icon>
    </a>

    <!-- Payroll -->
    <a mat-list-item class="item"
       routerLink="/app/payroll"
       (click)="closeInvoice()">
      <mat-icon class="icon">payments</mat-icon>
    </a>

    <!-- ================= DUTY MODULE ================= -->

    <!-- ADMIN: Add Duty / Manage -->
    <a *ngIf="auth.canEdit()"
       mat-list-item
       class="item"
       routerLink="/app/duties"
       (click)="closeInvoice()">
      <mat-icon class="icon">assignment</mat-icon>
    </a>

    <!-- EMPLOYEE: My Work -->
    <a *ngIf="!auth.canEdit()"
       mat-list-item
       class="item"
       routerLink="/app/my-work"
       (click)="closeInvoice()">
      <mat-icon class="icon">task_alt</mat-icon>
    </a>

    <!-- ================= INVOICE BLOCK ================= -->

    <div class="invoice-block">

      <div class="item invoice-main"
           (click)="toggleInvoice($event)">
        <mat-icon class="icon">receipt_long</mat-icon>
      </div>

      <div class="invoice-inline" *ngIf="invoiceOpen">

        <a mat-list-item class="item sub-item"
           routerLink="/app/invoices"
           (click)="closeInvoice()">
          <mat-icon class="sub-icon">add</mat-icon>
        </a>

        <a mat-list-item class="item sub-item"
           routerLink="/app/invoices/list"
           (click)="closeInvoice()">
          <mat-icon class="sub-icon">visibility</mat-icon>
        </a>

      </div>
    </div>

    <!-- Clients -->
    <a mat-list-item class="item"
       routerLink="/app/clients"
       (click)="closeInvoice()">
      <mat-icon class="icon">groups</mat-icon>
    </a>

    <!-- Credentials -->
    <a mat-list-item class="item"
       routerLink="/app/credentials"
       (click)="closeInvoice()">
      <mat-icon class="icon">admin_panel_settings</mat-icon>
    </a>

  </mat-nav-list>
</nav>
