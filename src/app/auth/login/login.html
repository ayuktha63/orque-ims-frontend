<div class="wrap">
  <mat-card class="card">
    <div class="login-header">
      <h2>Login</h2>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full">
        <mat-label>Username</mat-label> 
        <input matInput formControlName="username" />
        <mat-error *ngIf="form.get('username')?.invalid">Username is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" />
        <mat-error *ngIf="form.get('password')?.invalid">Password is required (min 4 chars)</mat-error>
      </mat-form-field>

      <button 
        mat-flat-button 
        color="primary" 
        class="full submit-btn" 
        type="submit" 
        [disabled]="form.invalid">
        Sign in
      </button>
    </form>
  </mat-card>

  <div class="version-info">
    Last updated: 2026-03-16 21:35 |
    <span class="version-hover">
      Version 2
      <div class="tooltip-box">
        <div class="tooltip-title">Features:</div>
        <ul class="tooltip-list">
          <li>Attendance</li>
          <li>Credentials</li>
          <li>Duty</li>
          <li>Employee</li>
          <li>Finance</li>
          <li>Invoices</li>
          <li>Payroll</li>
        </ul>
      </div>
    </span>
  </div>
</div>
