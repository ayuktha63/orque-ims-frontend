<div class="wrap">
  <mat-card class="card">
    <h2>Login</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full">
        <mat-label>Username</mat-label> 
        <input matInput formControlName="username" />
        <mat-error *ngIf="form.get('username')?.invalid">Username is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" />
        <mat-error *ngIf="form.get('password')?.invalid">Password is required (min 4 chars)</mat-error>
      </mat-form-field>

      <button 
        mat-raised-button 
        color="primary" 
        class="full" 
        type="submit" 
        [disabled]="form.invalid">
        Sign in
      </button>
    </form>
  </mat-card>
</div>
