<mat-card class="invoice-list-card">

  <!-- Header -->
  <div class="header">
    <h2>Invoices</h2>

    <mat-form-field appearance="outline" class="search">
      <mat-label>Search Invoice</mat-label>
      <input
        matInput
        placeholder="Invoice number"
        [(ngModel)]="searchText">
    </mat-form-field>
  </div>

  <!-- Table -->
  <table mat-table [dataSource]="filteredInvoices" class="mat-elevation-z1">

    <!-- Invoice Number -->
    <ng-container matColumnDef="invoiceNumber">
      <th mat-header-cell *matHeaderCellDef>Invoice No</th>
      <td mat-cell *matCellDef="let inv">
        {{ inv.invoiceNumber }}
      </td>
    </ng-container>

    <!-- Date -->
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let inv">
        {{ inv.date }}
      </td>
    </ng-container>

    <!-- Total -->
    <ng-container matColumnDef="total">
      <th mat-header-cell *matHeaderCellDef>Total (₹)</th>
      <td mat-cell *matCellDef="let inv">
        ₹{{ inv.total }}
      </td>
    </ng-container>

    <!-- Paid -->
    <ng-container matColumnDef="paid">
      <th mat-header-cell *matHeaderCellDef>Paid (₹)</th>
      <td mat-cell *matCellDef="let inv">
        ₹{{ inv.paid }}
      </td>
    </ng-container>

    <!-- Remaining -->
    <ng-container matColumnDef="remaining">
      <th mat-header-cell *matHeaderCellDef>Remaining (₹)</th>
      <td mat-cell *matCellDef="let inv">
        ₹{{ inv.remaining }}
      </td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let inv" class="actions">
        <button mat-icon-button color="primary" (click)="viewInvoice(inv)">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button color="accent" (click)="downloadInvoice(inv)">
          <mat-icon>download</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

</mat-card>
