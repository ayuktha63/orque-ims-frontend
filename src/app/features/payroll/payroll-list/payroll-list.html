<mat-card class="card">
  <div class="header">
    <h2>Payroll Management</h2>
    <button mat-raised-button color="primary" (click)="add()">
      Add Payroll
    </button>
  </div>

  <table mat-table [dataSource]="(rows$ | async) || []" class="full">

    <!-- SELECT CHECKBOX -->
    <ng-container matColumnDef="select">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let r">
        <mat-checkbox
          (change)="toggleRow(r, $event.checked)">
        </mat-checkbox>
      </td>
    </ng-container>

    <ng-container matColumnDef="payrollCode">
      <th mat-header-cell *matHeaderCellDef>Code</th>
      <td mat-cell *matCellDef="let r">{{ r.payrollCode }}</td>
    </ng-container>

    <ng-container matColumnDef="month">
      <th mat-header-cell *matHeaderCellDef>Month</th>
      <td mat-cell *matCellDef="let r">{{ r.month }}</td>
    </ng-container>

    <ng-container matColumnDef="employeeName">
      <th mat-header-cell *matHeaderCellDef>Employee</th>
      <td mat-cell *matCellDef="let r">{{ r.employeeName }}</td>
    </ng-container>

    <ng-container matColumnDef="basic">
      <th mat-header-cell *matHeaderCellDef>Basic</th>
      <td mat-cell *matCellDef="let r">₹{{ r.basic }}</td>
    </ng-container>

    <ng-container matColumnDef="allowances">
      <th mat-header-cell *matHeaderCellDef>Allowances</th>
      <td mat-cell *matCellDef="let r">₹{{ r.allowances }}</td>
    </ng-container>

    <ng-container matColumnDef="deductions">
      <th mat-header-cell *matHeaderCellDef>Deductions</th>
      <td mat-cell *matCellDef="let r">₹{{ r.deductions }}</td>
    </ng-container>

    <ng-container matColumnDef="netPay">
      <th mat-header-cell *matHeaderCellDef>Net Pay</th>
      <td mat-cell *matCellDef="let r"><b>₹{{ r.netPay }}</b></td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let r" class="actions">
        <button mat-stroked-button color="primary" (click)="edit(r)">
          Edit
        </button>
        <button mat-stroked-button class="delete-btn" (click)="remove(r)">
          Delete
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</mat-card>

<!-- FOOTER POPUP -->
<div class="footer-popup" *ngIf="selectedRows.length > 0">

  <button mat-button color="warn"
          (click)="clearSelection()">
    ✕ Close
  </button>

  <button mat-raised-button color="primary"
          (click)="generatePdf()">
    Generate Payroll
  </button>

</div>
