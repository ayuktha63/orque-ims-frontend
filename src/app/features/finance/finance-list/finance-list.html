<div class="finance-wrapper">

<mat-card class="card">
  <div class="header">
    <h2>Finance Transactions</h2>
    <button mat-raised-button color="primary" (click)="add()">
      Add Entry
    </button>
  </div>

  <!-- SAFE ASYNC UNWRAP -->
  <ng-container *ngIf="rows$ | async as rows">

    <table mat-table [dataSource]="rows" class="full">

      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let r">{{ r.date }}</td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let r">
          <span [ngClass]="r.type === 'INCOME' ? 'text-success' : 'text-danger'">
            {{ r.type }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef>Category</th>
        <td mat-cell *matCellDef="let r">{{ r.category }}</td>
      </ng-container>

      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef>Amount</th>
        <td mat-cell *matCellDef="let r">₹ {{ r.amount | number:'1.2-2' }}</td>
      </ng-container>

      <ng-container matColumnDef="paymentMode">
        <th mat-header-cell *matHeaderCellDef>Mode</th>
        <td mat-cell *matCellDef="let r">{{ r.paymentMode }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let r">{{ r.description || '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r">
          <button mat-stroked-button color="primary" (click)="edit(r)">Edit</button>
          <button mat-stroked-button (click)="remove(r)">X</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <div *ngIf="rows.length === 0" class="empty-state">
      <p>No transactions found for this period.</p>
    </div>

  </ng-container>

</mat-card>

<!-- ✅ REACTIVE SIDEBAR -->
<ng-container *ngIf="minimizedDrafts$ | async as drafts">

<div class="draft-sidebar" *ngIf="drafts.length > 0">

  <h3>Minimized Drafts</h3>

  <div *ngFor="let d of drafts; let i=index" class="draft-card">

    <div class="draft-info">
      <strong>{{ d.category || 'Draft Entry' }}</strong>
      <span>₹ {{ d.amount }}</span>
    </div>

    <div class="draft-actions">
      <button mat-stroked-button color="primary"
              (click)="restoreDraft(d,i)">Restore</button>

      <button mat-icon-button color="warn"
              (click)="discardDraft(i)">
        <mat-icon>close</mat-icon>
      </button>
    </div>

  </div>

</div>

</ng-container>

</div>
