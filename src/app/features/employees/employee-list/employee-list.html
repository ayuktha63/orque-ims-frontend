<mat-card class="card">

  <div class="header">
    <h2>Employees</h2>

    <!-- ADD BUTTON -->
    <button *ngIf="canManageEmployees()"
            mat-raised-button
            color="primary"
            (click)="add()">
      Add Employee
    </button>
  </div>

  <div class="table-wrapper">
    <table mat-table [dataSource]="(rows$ | async) || []" class="full">

      <!-- CODE -->
      <ng-container matColumnDef="employeeCode">
        <th mat-header-cell *matHeaderCellDef>Code</th>
        <td mat-cell *matCellDef="let r">{{ r.employeeCode }}</td>
      </ng-container>

      <!-- NAME -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let r">{{ r.name }}</td>
      </ng-container>

      <!-- EMAIL -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let r">
          {{ r.email || '-' }}
        </td>
      </ng-container>

      <!-- DEPARTMENT -->
      <ng-container matColumnDef="department">
        <th mat-header-cell *matHeaderCellDef>Department</th>
        <td mat-cell *matCellDef="let r">
          {{ r.department || '-' }}
        </td>
      </ng-container>

      <!-- ROLE -->
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let r">
          {{ r.role || '-' }}
        </td>
      </ng-container>

      <!-- STATUS -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let r">
          <!-- We could make this a pill later like the dashboard -->
          {{ r.status }}
        </td>
      </ng-container>

      <!-- ACTIONS -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r" class="actions">

          <!-- EDIT / VIEW -->
          <button mat-stroked-button
                  color="primary"
                  (click)="edit(r)">
            {{ canManageEmployees() ? 'Edit' : 'View' }}
          </button>

          <!-- DELETE -->
          <button *ngIf="canManageEmployees()"
                  mat-stroked-button
                  class="delete-btn"
                  (click)="remove(r)">
            Delete
          </button>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>
  </div>

  <!-- EMPTY STATE -->
  <div *ngIf="(rows$ | async)?.length === 0" class="empty-state">
    No employees found.
  </div>

</mat-card>
