<div class="dashboard-grid">

  <!-- KPI CARD -->
  <mat-card class="stat-card">
    <h3>Net Profit</h3>
    <p [ngClass]="summary.profit >= 0 ? 'pos' : 'neg'">
      ₹ {{ summary.profit }}
    </p>
  </mat-card>

  <!-- INCOME VS EXPENSE -->
  <mat-card *ngIf="incomeExpenseChart">
    <apx-chart
      [series]="incomeExpenseChart.series"
      [chart]="incomeExpenseChart.chart"
      [xaxis]="incomeExpenseChart.xaxis"
      [colors]="incomeExpenseChart.colors">
    </apx-chart>
  </mat-card>

  <!-- CATEGORY DONUT -->
  <mat-card *ngIf="categoryChart">
    <apx-chart
      [series]="categoryChart.series"
      [chart]="categoryChart.chart"
      [labels]="categoryChart.labels">
    </apx-chart>
  </mat-card>

  <!-- ✅ TASKS ASSIGNED (FRONTEND ONLY) -->
  <mat-card class="task-card">
    <h3>Tasks Assigned</h3>

    <div *ngIf="tasks.length === 0" class="empty">
      No tasks assigned
    </div>

    <div class="task" *ngFor="let task of tasks">
      <div>
        <strong>{{ task.title }}</strong>
        <div class="meta">
          {{ task.assignedTo }} · Due {{ task.dueDate }}
        </div>
      </div>

      <span class="status" [ngClass]="task.status.toLowerCase()">
        {{ task.status }}
      </span>
    </div>
  </mat-card>

</div>
