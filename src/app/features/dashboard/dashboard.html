<div class="dashboard-grid">

  <!-- KPI CARD -->
  <mat-card class="stat-card">
    <h3>Net Profit</h3>
    <p [ngClass]="summary.profit >= 0 ? 'pos' : 'neg'">
      ₹ {{ summary.profit }}
    </p>
  </mat-card>

  <!-- INCOME VS EXPENSE -->
  <mat-card *ngIf="incomeExpenseChart?.series?.length">
    <apx-chart
      [series]="incomeExpenseChart.series"
      [chart]="incomeExpenseChart.chart"
      [xaxis]="incomeExpenseChart.xaxis"
      [colors]="incomeExpenseChart.colors">
    </apx-chart>
  </mat-card>

  <!-- CATEGORY DONUT -->
  <mat-card *ngIf="categoryChart?.series?.length">
    <apx-chart
      [series]="categoryChart.series"
      [chart]="categoryChart.chart"
      [labels]="categoryChart.labels">
    </apx-chart>
  </mat-card>

  <!-- ✅ LIVE ONGOING DUTIES -->
  <mat-card class="task-card">
    <h3>Ongoing Duties</h3>

    <div *ngIf="ongoingDuties.length === 0" class="empty">
      No ongoing duties
    </div>

    <div class="task" *ngFor="let duty of ongoingDuties">
      <div>
        <strong>{{ duty.title }}</strong>
        <div class="meta">
          Job {{ duty.jobId }} · {{ duty.assignedTo?.name || '-' }}
        </div>
      </div>

      <span class="status ongoing">
        ONGOING
      </span>
    </div>

  </mat-card>

</div>
