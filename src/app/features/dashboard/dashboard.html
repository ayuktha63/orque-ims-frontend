<div class="dashboard-grid">

  <!-- HEADER -->
  <div class="dashboard-header">

    <span class="title">Dashboards</span>

    <button mat-icon-button [matMenuTriggerFor]="menu">
      <mat-icon>tune</mat-icon>
    </button>

    <mat-menu #menu="matMenu">

      <!-- FINANCE + SYSTEM_ADMIN OPTIONS -->
      <ng-container *ngIf="canViewFinanceDashboard">

        <button mat-menu-item (click)="$event.stopPropagation()">
          <mat-checkbox [(ngModel)]="dashboardConfig.profit"
                        (change)="onConfigChange()">
            Profit
          </mat-checkbox>
        </button>

        <button mat-menu-item (click)="$event.stopPropagation()">
          <mat-checkbox [(ngModel)]="dashboardConfig.incomeChart"
                        (change)="onConfigChange()">
            Income Chart
          </mat-checkbox>
        </button>

        <button mat-menu-item (click)="$event.stopPropagation()">
          <mat-checkbox [(ngModel)]="dashboardConfig.duties"
                        (change)="onConfigChange()">
            Ongoing Duties
          </mat-checkbox>
        </button>

      </ng-container>

      <!-- OTHER USERS -->
      <ng-container *ngIf="!canViewFinanceDashboard">

        <button mat-menu-item (click)="$event.stopPropagation()">
          <mat-checkbox [(ngModel)]="dashboardConfig.duties"
                        (change)="onConfigChange()">
            Ongoing Duties
          </mat-checkbox>
        </button>

      </ng-container>

    </mat-menu>

  </div>

  <!-- KPI (SYSTEM_ADMIN + FINANCE) -->
  <mat-card class="stat-card"
            *ngIf="dashboardConfig.profit && canViewFinanceDashboard">
    <h3>Net Profit</h3>
    <p [ngClass]="summary.profit >= 0 ? 'pos' : 'neg'">
      ₹ {{ summary.profit }}
    </p>
  </mat-card>

  <!-- INCOME EXPENSE CHART -->
  <mat-card *ngIf="canViewFinanceDashboard &&
                   dashboardConfig.incomeChart &&
                   incomeExpenseChart?.series?.length">
    <apx-chart
      [series]="incomeExpenseChart.series"
      [chart]="incomeExpenseChart.chart"
      [xaxis]="incomeExpenseChart.xaxis"
      [colors]="incomeExpenseChart.colors">
    </apx-chart>
  </mat-card>

  <!-- CATEGORY CHART -->
  <mat-card *ngIf="canViewFinanceDashboard &&
                   dashboardConfig.categoryChart &&
                   categoryChart?.series?.length">
    <apx-chart
      [series]="categoryChart.series"
      [chart]="categoryChart.chart"
      [labels]="categoryChart.labels">
    </apx-chart>
  </mat-card>

  <!-- DUTIES (ALL USERS) -->
  <mat-card class="task-card" *ngIf="dashboardConfig.duties">
    <h3>Ongoing Duties</h3>

    <div *ngIf="ongoingDuties.length === 0" class="empty">
      No ongoing duties
    </div>

    <div class="task" *ngFor="let duty of ongoingDuties">
      <div>
        <strong>{{ duty.title }}</strong>
        <div class="meta">
          Job {{ duty.jobId }} · {{ duty.assignedTo?.name || '-' }}
        </div>
      </div>

      <span class="status ongoing">ONGOING</span>
    </div>

  </mat-card>

</div>
