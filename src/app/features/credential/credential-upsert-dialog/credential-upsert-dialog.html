<h2 mat-dialog-title>{{ isEdit ? 'Update Login' : 'Setup New Login' }}</h2>
<mat-dialog-content>
  <p>Configuring access for: <strong>{{ data.employee.name }}</strong></p>
  
  <form [formGroup]="form" class="upsert-form">
    <mat-form-field appearance="outline">
      <mat-label>Username</mat-label>
      <input matInput formControlName="username" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>{{ isEdit ? 'New Password (Optional)' : 'Password' }}</mat-label>
      <input matInput type="password" formControlName="password" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Role</mat-label>
      <mat-select formControlName="role">
        <mat-option value="USER">Standard User</mat-option>
        <mat-option value="ADMIN">Administrator</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="ref.close(false)">Cancel</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid" (click)="save()">
    Save Credentials
  </button>
</mat-dialog-actions>
