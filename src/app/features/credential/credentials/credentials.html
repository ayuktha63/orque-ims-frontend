<mat-card class="card">
  <div class="header">
    <h2>System Access Credentials</h2>
    <p class="subtitle">
      Management of employee system access and administrative roles.
    </p>
  </div>

  <table mat-table [dataSource]="(authorizedEmployees$ | async) || []" class="full">

    <!-- EMPLOYEE ID -->
    <ng-container matColumnDef="employeeCode">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let r">{{ r.employeeId }}</td>
    </ng-container>

    <!-- NAME -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Employee</th>
      <td mat-cell *matCellDef="let r">{{ r.name }}</td>
    </ng-container>

    <!-- USERNAME -->
    <ng-container matColumnDef="username">
      <th mat-header-cell *matHeaderCellDef>Username</th>
      <td mat-cell *matCellDef="let r">
        <code *ngIf="r.hasAccess">{{ r.username }}</code>
        <span *ngIf="!r.hasAccess" class="no-login">No Login Set</span>
      </td>
    </ng-container>

    <!-- PASSWORD -->
    <ng-container matColumnDef="password">
      <th mat-header-cell *matHeaderCellDef>Password</th>
      <td mat-cell *matCellDef="let r">
        <span *ngIf="r.password" class="password-cell">{{ r.password }}</span>
        <span *ngIf="!r.password" class="no-login">No Password Set</span>
      </td>
    </ng-container>

    <!-- ROLE -->
    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef>Role</th>
      <td mat-cell *matCellDef="let r">
        <span *ngIf="r.hasAccess"
              class="badge"
              [ngClass]="{
                'sysadmin-bg': r.role === 'SYSTEM_ADMIN',
                'manager-bg': r.role === 'MANAGER',
                'hr-bg': r.role === 'HR',
                'finance-bg': r.role === 'FINANCE',
                'employee-bg': r.role === 'EMPLOYEE',
                'intern-bg': r.role === 'INTERN'
              }">
          {{ r.role || 'N/A' }}
        </span>
      </td>
    </ng-container>

    <!-- ACTIONS -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let r" class="actions">
        <button mat-stroked-button color="primary"
                (click)="manageCredentials(r)">
          {{ r.hasAccess ? 'Edit Login' : 'Setup Login' }}
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row
        *matRowDef="let row; columns: displayedColumns;"
        [class.no-access-row]="!row.hasAccess">
    </tr>

  </table>
</mat-card>
