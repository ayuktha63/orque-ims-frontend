<h2 mat-dialog-title>Add Duty</h2>

<div mat-dialog-content [formGroup]="form" class="form-layout">

  <!-- TITLE -->
  <mat-form-field appearance="outline" class="full">
    <mat-label>Title</mat-label>
    <input matInput formControlName="title">
  </mat-form-field>

  <!-- DESCRIPTION -->
  <mat-form-field appearance="outline" class="full">
    <mat-label>Description</mat-label>
    <textarea matInput rows="3" formControlName="description"></textarea>
  </mat-form-field>

  <!-- DEADLINE (CALENDAR DATEPICKER) -->
  <mat-form-field appearance="outline" class="full">
    <mat-label>Deadline</mat-label>

    <input
      matInput
      [matDatepicker]="picker"
      formControlName="deadline">

    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>

  <!-- EMPLOYEE -->
  <mat-form-field appearance="outline" class="full">
    <mat-label>Assign Employee</mat-label>

    <mat-select formControlName="employeeId">
      <mat-option *ngFor="let e of (employees$ | async)" [value]="e.id">
        {{ e.name }}
      </mat-option>
    </mat-select>
  </mat-form-field>

</div>

<div mat-dialog-actions align="end">
  <button mat-stroked-button (click)="close()">Cancel</button>
  <button mat-flat-button color="primary" (click)="save()">Save</button>
</div>
