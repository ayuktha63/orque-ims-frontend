<mat-card>

  <table mat-table [dataSource]="(rows$ | async) ?? []" class="mat-elevation-z1">

    <!-- JOB ID -->
    <ng-container matColumnDef="jobId">
      <th mat-header-cell *matHeaderCellDef> Job ID </th>
      <td mat-cell *matCellDef="let row">
        {{ row.jobId }}
      </td>
    </ng-container>

    <!-- TITLE -->
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef> Title </th>
      <td mat-cell *matCellDef="let row">
        {{ row.title }}
      </td>
    </ng-container>

    <!-- DESCRIPTION -->
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef> Description </th>
      <td mat-cell *matCellDef="let row">
        {{ row.description }}
      </td>
    </ng-container>

    <!-- DEADLINE -->
    <ng-container matColumnDef="deadline">
      <th mat-header-cell *matHeaderCellDef> Deadline </th>
      <td mat-cell *matCellDef="let row">
        {{ row.deadline | date:'dd MMM yyyy' }}
      </td>
    </ng-container>

    <!-- STATUS -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let row">
        {{ row.status }}
      </td>
    </ng-container>

    <!-- ACTIONS -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let row">

        <button mat-button
                *ngIf="row.status === 'ASSIGNED' || row.status === 'PENDING_APPROVAL'"
                (click)="ack(row)">
          Start
        </button>

        <button mat-button
                *ngIf="row.status === 'ONGOING'"
                (click)="finish(row)">
          Finish
        </button>

      </td>
    </ng-container>

    <!-- HEADER -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <!-- ROW -->
    <tr mat-row
        *matRowDef="let row; columns: displayedColumns; trackBy: trackById">
    </tr>

  </table>

</mat-card>
