<mat-tab-group>

  <!-- ================= TAB 1 : RAISE DEFECT ================= -->
  <mat-tab label="Raise Defect">

    <h2 class="title">Raise Defect / Issue</h2>

    <div class="content" [formGroup]="form">

      <mat-form-field class="full">
        <mat-label>Job ID</mat-label>
        <mat-select formControlName="jobId">
          <mat-option *ngFor="let j of jobs" [value]="j.jobId">
            {{ j.jobId }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field class="full">
        <mat-label>Issue Description</mat-label>
        <textarea matInput rows="4" formControlName="issue"></textarea>
      </mat-form-field>

      <button mat-raised-button color="primary" (click)="save()">
        Submit Defect
      </button>

    </div>

  </mat-tab>

  <!-- ================= TAB 2 : MY RAISED ================= -->
  <mat-tab label="My Raised Defects">

    <table mat-table [dataSource]="myRaisedDefects" class="full-table">

      <ng-container matColumnDef="jobId">
        <th mat-header-cell *matHeaderCellDef>Job ID</th>
        <td mat-cell *matCellDef="let d">{{d.jobId}}</td>
      </ng-container>

      <ng-container matColumnDef="issue">
        <th mat-header-cell *matHeaderCellDef>Issue</th>
        <td mat-cell *matCellDef="let d">{{d.issue}}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let d">{{d.status}}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

  </mat-tab>

  <!-- ================= TAB 3 : MY ASSIGNED ================= -->
  <mat-tab label="My Assigned Defects">

    <table mat-table [dataSource]="myAssignedDefects" class="full-table">

      <ng-container matColumnDef="jobId">
        <th mat-header-cell *matHeaderCellDef>Job ID</th>
        <td mat-cell *matCellDef="let d">{{d.jobId}}</td>
      </ng-container>

      <ng-container matColumnDef="issue">
        <th mat-header-cell *matHeaderCellDef>Issue</th>
        <td mat-cell *matCellDef="let d">{{d.issue}}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let d">{{d.status}}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

  </mat-tab>

</mat-tab-group>
