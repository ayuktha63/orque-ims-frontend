<h2 class="title">Raise Defect / Issue</h2>

<div class="content" [formGroup]="form">

  <!-- ⭐ JOB ID DROPDOWN -->
  <mat-form-field class="full">
    <mat-label>Job ID</mat-label>

    <mat-select formControlName="jobId">
      <mat-option *ngFor="let j of jobs" [value]="j.jobId">
        {{ j.jobId }}
      </mat-option>
    </mat-select>

  </mat-form-field>

  <mat-form-field class="full">
    <mat-label>Issue Description</mat-label>
    <textarea matInput rows="4" formControlName="issue"></textarea>
  </mat-form-field>

  <mat-form-field class="full">
    <mat-label>Priority</mat-label>
    <mat-select formControlName="priority">
      <mat-option value="LOW">Low</mat-option>
      <mat-option value="MEDIUM">Medium</mat-option>
      <mat-option value="HIGH">High</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field class="full">
    <mat-label>Status</mat-label>
    <mat-select formControlName="status">
      <mat-option value="OPEN">OPEN</mat-option>
      <mat-option value="CLOSED">CLOSED</mat-option>
    </mat-select>
  </mat-form-field>

  <button mat-raised-button color="primary" (click)="save()">
    Submit Defect
  </button>

</div>

<h3 class="list-title">Defects</h3>

<table mat-table [dataSource]="defects" class="full-table">

  <ng-container matColumnDef="jobId">
    <th mat-header-cell *matHeaderCellDef>Job ID</th>
    <td mat-cell *matCellDef="let d">{{d.jobId}}</td>
  </ng-container>

  <ng-container matColumnDef="issue">
    <th mat-header-cell *matHeaderCellDef>Issue</th>
    <td mat-cell *matCellDef="let d">{{d.issue}}</td>
  </ng-container>

  <ng-container matColumnDef="priority">
    <th mat-header-cell *matHeaderCellDef>Priority</th>
    <td mat-cell *matCellDef="let d">{{d.priority}}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let d">{{d.status}}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
