name: Deploy ORQUE IMS

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: /home/ayuktha/orque-ims-frontend

    steps:
      - name: Pull Latest Code
        run: |
          git fetch origin
          git reset --hard origin/develop

      - name: Install Dependencies
        run: npm install

      - name: Build Angular SSR
        run: npm run build

      - name: Move Build to Production Directory
        run: |
          sudo rm -rf /var/www/orque-ims/*
          sudo cp -r dist/orque-ims-frontend/* /var/www/orque-ims/

      - name: Restart Frontend
        run: |
          chmod +x ~/restart-frontend.sh
          ~/restart-frontend.sh